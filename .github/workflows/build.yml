name: Build

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
      - name: Build & Test
        run: ./mvnw clean verify
      - name: Archive Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: target
          path: target/