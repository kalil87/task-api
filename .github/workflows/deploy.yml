name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login Railway
        run: railway login --apiKey ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy to Production
        run: railway up --production